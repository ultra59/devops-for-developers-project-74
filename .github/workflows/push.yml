name: CI/CD Pipeline

on:
    push:
        branches:
            - main

jobs:
    test-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up QEMU (for multi-arch builds)
              uses: docker/setup-qemu-action@v2

            - name: Set up Buildx
              uses: docker/setup-buildx-action@v2

            - name: Login to Docker Hub
              uses: docker/login-action@v2
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Run tests with Docker Compose
              run: |
                  docker compose -f docker-compose.yml up --abort-on-container-exit --exit-code-from app

            - name: Build production image
              run: |
                  docker build -f Dockerfile.production -t ${{ secrets.DOCKER_USERNAME }}/devops-for-developers-project-74:latest .
                  # Альтернатива: привести к явному именованию образа через переменную
                  # IMAGE_TAG=latest
                  # docker build -f Dockerfile.production -t ${{ secrets.DOCKER_USERNAME }}/devops-for-developers-project-74:${IMAGE_TAG} .

            - name: Push to Docker Hub
              run: |
                  docker push ${{ secrets.DOCKER_USERNAME }}/devops-for-developers-project-74:latest
